<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Student Profile Setup - Attendance Pro</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error": "#ffffff",
                        "surface-variant": "#e3e1e9",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed-variant": "#773205",
                        "inverse-surface": "#2f3036",
                        "background": "#faf8ff",
                        "secondary-fixed": "#c0e8ff",
                        "primary": "#00236f",
                        "inverse-on-surface": "#f1f0f7",
                        "surface-bright": "#faf8ff",
                        "secondary": "#006686",
                        "tertiary-fixed-dim": "#ffb691",
                        "error": "#ba1a1a",
                        "surface-container-highest": "#e3e1e9",
                        "on-primary-fixed-variant": "#264191",
                        "primary-fixed-dim": "#b6c4ff",
                        "surface-dim": "#dad9e1",
                        "inverse-primary": "#b6c4ff",
                        "on-tertiary-container": "#f39461",
                        "on-secondary-container": "#005b78",
                        "on-surface": "#1a1b21",
                        "on-background": "#1a1b21",
                        "on-primary-container": "#90a8ff",
                        "surface-container-low": "#f4f3fa",
                        "surface": "#faf8ff",
                        "outline-variant": "#c5c5d3",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#ffdbcb",
                        "error-container": "#ffdad6",
                        "secondary-fixed-dim": "#7bd1fa",
                        "outline": "#757682",
                        "surface-tint": "#4059aa",
                        "on-primary-fixed": "#00164e",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed": "#341100",
                        "surface-container": "#eeedf4",
                        "secondary-container": "#7ed4fd",
                        "on-surface-variant": "#444651",
                        "on-secondary-fixed": "#001e2b",
                        "primary-fixed": "#dce1ff",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed-variant": "#004d66",
                        "primary-container": "#1e3a8a",
                        "tertiary": "#4b1c00",
                        "surface-container-high": "#e9e7ef",
                        "tertiary-container": "#6e2c00",
                        "on-error-container": "#93000a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-gap-sm": "8px",
                        "grid-gutter": "12px",
                        "base": "4px",
                        "container-padding": "16px",
                        "stack-gap-md": "12px",
                        "stack-gap-lg": "20px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-sm": ["Inter"],
                        "label-md": ["Inter"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-sm": ["Inter"]
                    },
                    "fontSize": {
                        "label-sm": ["11px", { "lineHeight": "14px", "fontWeight": "500" }],
                        "headline-lg": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-sm": ["12px", { "lineHeight": "16px", "fontWeight": "400" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "headline-sm": ["16px", { "lineHeight": "24px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body { background-color: #F8FAFC; } /* Level 0 Background */
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.02); }
        .input-bg { background-color: #F1F5F9; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-surface font-body-md min-h-screen flex flex-col items-center pt-8 pb-24 px-4 sm:px-6 md:px-8">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-container-padding h-16 max-w-[768px] mx-auto bg-surface shadow-sm transition-colors">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-bold text-sm">
                UA
            </div>
<h1 class="font-headline-md text-headline-md font-bold text-primary">Attendance Pro</h1>
</div>
<div class="text-on-surface-variant font-label-md text-label-md">
            Sem 5
        </div>
</header>
<main class="w-full max-w-[768px] mt-20 flex flex-col gap-stack-gap-lg">
<div class="mb-4">
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-2">Student Profile Setup</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Complete your academic profile to start tracking attendance.</p>
</div>
<form class="flex flex-col gap-stack-gap-lg">
<!-- Section 1: Personal Information -->
<section class="bg-surface rounded-xl border border-outline-variant card-shadow p-container-padding">
<h3 class="font-headline-sm text-headline-sm text-primary mb-4 flex items-center gap-2 border-b border-surface-container pb-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">person</span>
                    Personal Information
                </h3>
<div class="flex flex-col gap-stack-gap-md">
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1" for="studentName">Student Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">badge</span>
<input class="w-full h-12 pl-10 pr-4 rounded-lg border-none input-bg focus:ring-2 focus:ring-primary focus:bg-surface transition-colors font-body-md text-on-surface placeholder:text-outline-variant" id="studentName" placeholder="Enter your full name" required="" type="text"/>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1" for="rollNo">Roll Number</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">numbers</span>
<input class="w-full h-12 pl-10 pr-4 rounded-lg border-none input-bg focus:ring-2 focus:ring-primary focus:bg-surface transition-colors font-body-md text-on-surface placeholder:text-outline-variant" id="rollNo" placeholder="e.g. 12345678" required="" type="text"/>
</div>
</div>
</div>
</section>
<!-- Section 2: Academic Details -->
<section class="bg-surface rounded-xl border border-outline-variant card-shadow p-container-padding">
<h3 class="font-headline-sm text-headline-sm text-primary mb-4 flex items-center gap-2 border-b border-surface-container pb-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">school</span>
                    Academic Details
                </h3>
<div class="flex flex-col gap-stack-gap-md">
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1" for="courseName">Course Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">book</span>
<input class="w-full h-12 pl-10 pr-4 rounded-lg border-none input-bg focus:ring-2 focus:ring-primary focus:bg-surface transition-colors font-body-md text-on-surface placeholder:text-outline-variant" id="courseName" placeholder="e.g. B.Tech Computer Science" required="" type="text"/>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2">Semester</label>
<div class="grid grid-cols-4 gap-2">
<!-- Radio group for semesters styled as chips -->
<label class="cursor-pointer">
<input class="peer sr-only" name="semester" type="radio" value="1"/>
<div class="h-10 flex items-center justify-center rounded-lg border border-outline-variant bg-surface text-on-surface-variant font-label-md peer-checked:bg-primary peer-checked:text-on-primary peer-checked:border-primary transition-colors">1</div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="semester" type="radio" value="2"/>
<div class="h-10 flex items-center justify-center rounded-lg border border-outline-variant bg-surface text-on-surface-variant font-label-md peer-checked:bg-primary peer-checked:text-on-primary peer-checked:border-primary transition-colors">2</div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="semester" type="radio" value="3"/>
<div class="h-10 flex items-center justify-center rounded-lg border border-outline-variant bg-surface text-on-surface-variant font-label-md peer-checked:bg-primary peer-checked:text-on-primary peer-checked:border-primary transition-colors">3</div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="semester" type="radio" value="4"/>
<div class="h-10 flex items-center justify-center rounded-lg border border-outline-variant bg-surface text-on-surface-variant font-label-md peer-checked:bg-primary peer-checked:text-on-primary peer-checked:border-primary transition-colors">4</div>
</label>
<label class="cursor-pointer">
<input checked="" class="peer sr-only" name="semester" type="radio" value="5"/>
<div class="h-10 flex items-center justify-center rounded-lg border border-outline-variant bg-surface text-on-surface-variant font-label-md peer-checked:bg-primary peer-checked:text-on-primary peer-checked:border-primary transition-colors">5</div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="semester" type="radio" value="6"/>
<div class="h-10 flex items-center justify-center rounded-lg border border-outline-variant bg-surface text-on-surface-variant font-label-md peer-checked:bg-primary peer-checked:text-on-primary peer-checked:border-primary transition-colors">6</div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="semester" type="radio" value="7"/>
<div class="h-10 flex items-center justify-center rounded-lg border border-outline-variant bg-surface text-on-surface-variant font-label-md peer-checked:bg-primary peer-checked:text-on-primary peer-checked:border-primary transition-colors">7</div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="semester" type="radio" value="8"/>
<div class="h-10 flex items-center justify-center rounded-lg border border-outline-variant bg-surface text-on-surface-variant font-label-md peer-checked:bg-primary peer-checked:text-on-primary peer-checked:border-primary transition-colors">8</div>
</label>
</div>
</div>
</div>
</section>
<!-- Section 3: Subjects -->
<section class="bg-surface rounded-xl border border-outline-variant card-shadow p-container-padding">
<h3 class="font-headline-sm text-headline-sm text-primary mb-4 flex items-center gap-2 border-b border-surface-container pb-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">list_alt</span>
                    Subjects
                </h3>
<p class="font-body-sm text-body-sm text-on-surface-variant mb-4">Enter minimum 6 subjects for this semester.</p>
<div class="grid grid-cols-1 md:grid-cols-2 gap-grid-gutter">
<!-- Subject 1 -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1" for="sub1">Subject 1</label>
<input class="w-full h-12 px-4 rounded-lg border-none input-bg focus:ring-2 focus:ring-primary focus:bg-surface transition-colors font-body-md text-on-surface placeholder:text-outline-variant" id="sub1" placeholder="e.g. Mathematics" required="" type="text"/>
</div>
<!-- Subject 2 -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1" for="sub2">Subject 2</label>
<input class="w-full h-12 px-4 rounded-lg border-none input-bg focus:ring-2 focus:ring-primary focus:bg-surface transition-colors font-body-md text-on-surface placeholder:text-outline-variant" id="sub2" placeholder="e.g. Data Structures" required="" type="text"/>
</div>
<!-- Subject 3 -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1" for="sub3">Subject 3</label>
<input class="w-full h-12 px-4 rounded-lg border-none input-bg focus:ring-2 focus:ring-primary focus:bg-surface transition-colors font-body-md text-on-surface placeholder:text-outline-variant" id="sub3" placeholder="Subject Name" required="" type="text"/>
</div>
<!-- Subject 4 -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1" for="sub4">Subject 4</label>
<input class="w-full h-12 px-4 rounded-lg border-none input-bg focus:ring-2 focus:ring-primary focus:bg-surface transition-colors font-body-md text-on-surface placeholder:text-outline-variant" id="sub4" placeholder="Subject Name" required="" type="text"/>
</div>
<!-- Subject 5 -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1" for="sub5">Subject 5</label>
<input class="w-full h-12 px-4 rounded-lg border-none input-bg focus:ring-2 focus:ring-primary focus:bg-surface transition-colors font-body-md text-on-surface placeholder:text-outline-variant" id="sub5" placeholder="Subject Name" required="" type="text"/>
</div>
<!-- Subject 6 -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1" for="sub6">Subject 6</label>
<input class="w-full h-12 px-4 rounded-lg border-none input-bg focus:ring-2 focus:ring-primary focus:bg-surface transition-colors font-body-md text-on-surface placeholder:text-outline-variant" id="sub6" placeholder="Subject Name" required="" type="text"/>
</div>
</div>
</section>
</form>
</main>
<!-- Footer Action -->
<div class="fixed bottom-0 w-full max-w-[768px] bg-surface border-t border-outline-variant p-4 flex justify-end z-40">
<button class="bg-primary text-on-primary font-label-md text-label-md px-6 h-12 rounded-lg flex items-center justify-center gap-2 hover:bg-on-primary-fixed transition-colors w-full md:w-auto shadow-sm">
            Save and Continue
            <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
</body></html>
