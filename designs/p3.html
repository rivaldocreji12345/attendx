<!-- Main Canvas -->
<main class="flex-1 w-full max-w-[768px] px-container-padding py-stack-gap-lg pb-32 overflow-y-auto">
<div class="mb-stack-gap-lg">
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-2">Mark Attendance</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Record student attendance for the current session.</p>
</div>
<form class="flex flex-col gap-stack-gap-lg">
<!-- Student Selection (Searchable) -->
<div class="bg-surface-container-lowest p-4 rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.02)] border border-surface-variant flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="student-search">Student</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">search</span>
<input autocomplete="off" class="w-full pl-10 pr-4 py-3 bg-surface-container-low border-none rounded-lg font-body-md text-body-md text-on-surface focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-colors" id="student-search" placeholder="Search student name or ID..." type="text">
</div>
<!-- Simulated Search Results Dropdown (Hidden by default, shown for context) -->
<div class="mt-2 bg-surface-container-lowest border border-surface-variant rounded-lg overflow-hidden hidden" id="search-results">
<button class="w-full text-left px-4 py-3 hover:bg-surface-container-high transition-colors font-body-md text-body-md text-on-surface border-b border-surface-variant flex items-center justify-between" type="button">
<span class="">John Doe <span class="text-on-surface-variant text-body-sm font-body-sm ml-2">ID: 1045</span></span>
<span class="material-symbols-outlined text-outline text-[18px]">add</span>
</button>
<button class="w-full text-left px-4 py-3 hover:bg-surface-container-high transition-colors font-body-md text-body-md text-on-surface flex items-center justify-between" type="button">
<span class="">Jane Smith <span class="text-on-surface-variant text-body-sm font-body-sm ml-2">ID: 1046</span></span>
<span class="material-symbols-outlined text-outline text-[18px]">add</span>
</button>
</div>
<!-- Selected Student Chip -->
<div class="flex items-center gap-2 mt-2">
<div class="inline-flex items-center gap-2 bg-primary-container text-on-primary-container px-3 py-1.5 rounded-lg border border-primary-fixed">
<span class="font-body-sm text-body-sm font-medium">Username (ID: 1024)</span>
<button class="text-on-primary-container hover:text-primary transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-[16px]">close</span>
</button>
</div>
</div>
</div>
<!-- Subject Selection -->
<div class="bg-surface-container-lowest p-4 rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.02)] border border-surface-variant flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="subject-select">Subject</label>
<div class="relative">
<select class="w-full appearance-none pl-4 pr-10 py-3 bg-surface-container-low border-none rounded-lg font-body-md text-body-md text-on-surface focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-colors cursor-pointer" id="subject-select">
<option disabled="" selected="" value="">Select a subject</option>
<option selected="" value="cs101">CS101 - Intro to Computer Science</option>
<option value="math201">MATH201 - Linear Algebra</option>
<option value="eng305">ENG305 - Technical Writing</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none">arrow_drop_down</span>
</div>
</div>
<!-- Date and Time Grid -->
<div class="grid grid-cols-2 gap-grid-gutter">
<div class="bg-surface-container-lowest p-4 rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.02)] border border-surface-variant flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="date-picker">Date</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">calendar_today</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-low border-none rounded-lg font-body-md text-body-md text-on-surface focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-colors" id="date-picker" type="date" value="2023-10-24">
</div>
</div>
<div class="bg-surface-container-lowest p-4 rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.02)] border border-surface-variant flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="time-picker">Time</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">schedule</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-low border-none rounded-lg font-body-md text-body-md text-on-surface focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-colors" id="time-picker" type="time" value="09:00">

                        Absent

<button class="flex-1 py-2 px-4 rounded-md bg-surface-container-lowest shadow-sm font-label-md text-label-md text-primary font-bold transition-all flex items-center justify-center gap-2" type="button">
<span class="w-2 h-2 rounded-full bg-[#16a34a]"></span> <!-- Using a standard green for positive status as per generic UI patterns, fitting within academic context -->

</div>
</div>
<!-- Action Button -->
<div class="mt-4">
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-4 rounded-lg shadow-sm hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined text-[20px]">save</span>

<span class="material-symbols-outlined">person</span>
<span class="font-label-md text-label-md">Profile</span>
</a>
</aside>
<script>
        // Simple interaction for the search input to demonstrate focus state
        const searchInput = document.getElementById('student-search');
        const searchResults = document.getElementById('search-results');

        searchInput.addEventListener('focus', () => {
            // In a real app, this would show after typing
            if(searchInput.value === '') {
                 // searchResults.classList.remove('hidden');
            }
        });

        searchInput.addEventListener('blur', () => {
            setTimeout(() => {
                searchResults.classList.add('hidden');
            }, 200);
        });

        searchInput.addEventListener('input', (e) => {
            if(e.target.value.length > 0) {
                searchResults.classList.remove('hidden');
            } else {
                searchResults.classList.add('hidden');
            }
        });
    </script>
